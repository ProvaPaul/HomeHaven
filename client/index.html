<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HomeHaven — find your perfect home. Browse, buy, and rent properties with confidence." />
    <title>HomeHaven | Find Your Perfect Home</title>
    <script>
      // Apply theme before paint to avoid flash of wrong theme
      (function () {
        var stored = localStorage.getItem('homehaven-theme');
        var dark = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
