<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HomeHaven — find your perfect home. Browse verified listings, get AI-powered recommendations, and buy or rent with confidence." />
    <meta name="theme-color" content="#1b6ff5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HomeHaven" />
    <meta property="og:title" content="HomeHaven | Find Your Perfect Home" />
    <meta property="og:description" content="Browse verified listings, get AI-powered recommendations, and buy or rent with confidence." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="HomeHaven | Find Your Perfect Home" />
    <meta name="twitter:description" content="Browse verified listings, get AI-powered recommendations, and buy or rent with confidence." />
    <title>HomeHaven | Find Your Perfect Home</title>
    <script>
      // Apply theme before paint to avoid flash of wrong theme
      (function () {
        var stored = localStorage.getItem('homehaven-theme');
        var dark = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
